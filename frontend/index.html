<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnezia WG Monitor — Real-time VPN traffic dashboard</title>
    <meta name="description"
        content="Monitor your AmneziaWG VPN server in real time. Track bandwidth, connected peers, traffic stats, and user groups from a single dashboard.">
    <meta property="og:title" content="Amnezia WG Monitor">
    <meta property="og:description" content="Real-time VPN traffic monitoring dashboard for AmneziaWG servers.">
    <meta property="og:type" content="website">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%230c0f14'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%232dd4a8'>A</text></svg>">
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <div class="app-container">
        <header class="header">
            <h1>Amnezia WG <span>Monitor</span></h1>
            <div class="status-indicator">
                <div class="pulse"></div>
                <span id="connection-status">Live</span>
            </div>
        </header>

        <main id="main-content" class="dashboard-content">

            <!-- Bandwidth load -->
            <div class="bandwidth-card animate-in stagger-1">
                <div class="bandwidth-header">
                    <div>
                        <div class="bandwidth-label">Current network load</div>
                        <div class="bandwidth-value" id="stat-bandwidth">0.00 <span class="stat-unit">Mbit/s</span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="bandwidth-avg-label">24h average</div>
                        <div class="bandwidth-avg-value" id="stat-avg-bandwidth">0.00 <span
                                class="stat-unit">Mbit/s</span></div>
                    </div>
                </div>
                <div class="traffic-bar-track">
                    <div class="traffic-bar-fill" id="bandwidth-bar"></div>
                </div>
            </div>

            <!-- Stats overview -->
            <section class="stats-grid animate-in stagger-2">
                <div class="stat-card">
                    <div class="stat-title">Total peers</div>
                    <div class="stat-value" id="stat-total-users">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Active now</div>
                    <div class="stat-value" id="stat-active-users">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Traffic sent</div>
                    <div class="stat-value" id="stat-total-tx">0 B</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Traffic received</div>
                    <div class="stat-value" id="stat-total-rx">0 B</div>
                </div>
            </section>

            <!-- Traffic chart -->
            <section class="chart-section animate-in stagger-3">
                <div class="section-bar">
                    <h2 class="section-heading">Traffic histogram</h2>
                    <select id="chart-group-toggle" class="filter-select">
                        <option value="device">Show by device</option>
                        <option value="group">Group by user</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="trafficChart"></canvas>
                </div>
            </section>

            <!-- Groups -->
            <section class="groups-section animate-in stagger-4">
                <div class="section-bar">
                    <h2 class="section-heading">Groups</h2>
                </div>
                <div class="users-grid" id="groups-grid">
                    <!-- Group cards injected via JS -->
                </div>
            </section>

            <!-- Connected peers -->
            <section class="users-section animate-in stagger-5">
                <div class="section-bar">
                    <h2 class="section-heading">Connected peers</h2>
                    <div class="filters">
                        <input type="text" id="search-input" class="filter-input" placeholder="Search by name or IP…">
                        <select id="status-filter" class="filter-select">
                            <option value="all">All status</option>
                            <option value="online">Online</option>
                            <option value="offline">Offline</option>
                        </select>
                        <select id="sort-filter" class="filter-select">
                            <option value="traffic">Sort by traffic</option>
                            <option value="recent">Sort by last seen</option>
                        </select>
                    </div>
                </div>
                <div class="users-grid" id="users-grid">
                    <!-- User cards injected via JS -->
                </div>
            </section>
        </main>

        <footer class="footer">
            Amnezia WG Monitor · <a href="https://github.com/IglFox/amnezia-traffic-viewer" target="_blank"
                rel="noopener">Source</a>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
